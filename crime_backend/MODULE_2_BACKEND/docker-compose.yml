version: '3.8'

services:
  frontend:
    build:
      context: ../crime_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${FRONTEND_VITE_API_URL:-http://localhost:8000/api}
      - VITE_WS_URL=${FRONTEND_VITE_WS_URL:-ws://localhost:8000/api/alerts/ws}
    networks:
      - crime_intelligence_network

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - neo4j
      - redis
    volumes:
      - .:/app
    networks:
      - crime_intelligence_network

  postgres:
    image: postgis/postgis:15-3.4
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crime_intelligence_network

  neo4j:
    image: neo4j:5.18-community
    env_file:
      - .env
    environment:
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    networks:
      - crime_intelligence_network

  redis:
    image: redis:7.2-alpine
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - crime_intelligence_network

volumes:
  postgres_data:
  neo4j_data:
  redis_data:

networks:
  crime_intelligence_network:
    driver: bridge
