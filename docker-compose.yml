version: '3.8'

services:
  frontend:
    build:
      context: ./crime_frontend
      args:
        VITE_API_URL: ${FRONTEND_VITE_API_URL}
        VITE_WS_URL: ${FRONTEND_VITE_WS_URL}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - crime_intelligence_network

  backend:
    build: ./crime_backend/MODULE_2_BACKEND
    restart: unless-stopped
    env_file:
      - ./crime_backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./crime_backend/MODULE_2_BACKEND/local_data/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crime_intelligence_network

  scheduler:
    build: ./crime_backend/MODULE_2_BACKEND
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.run_standalone"]
    env_file:
      - ./crime_backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - crime_intelligence_network


  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    env_file:
      - ./crime_backend/.env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - crime_intelligence_network

networks:
  crime_intelligence_network:
    driver: bridge
